name: airbyte-ci-teradata-master-sync-with-parent-master
on:
  schedule:
    - cron: '30 20,2 * * *' # At every 20.30 (8.30 PM) and 2.30 AM UTC timezone - 12.00 AM IST and 8 AM
  workflow_dispatch: # on button click
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

       - name: Checkout Airbyte Repo
         run: |
          rm -rf airbyte-repo 
          git clone --branch master https://github.com/airbytehq/airbyte.git airbyte-repo
          cd airbyte-repo
       - name: Configure Git
         run: |
          cd airbyte-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
       - name: Update master from Airbyte master repo
         run: |
          cd airbyte-repo
          git remote add teradata-repo https://x-access-token:${{ secrets.GITHUBTOKEN }}@github.com/Teradata/airbyte.git
          git fetch teradata-repo master
          # Check out Teradata's master and merge airbytehq/master into it
          git checkout master 
          git reset --hard teradata-repo/master
          git merge --no-ff --no-edit origin/master
          # Push merged changes back to Teradata master
          git push teradata-repo master    
       - name: Clean up
         run: |
          rm -rf airbyte-repo
